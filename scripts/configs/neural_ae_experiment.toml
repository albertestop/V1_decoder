[data]
# Load one pre-packed .npy/.npz array of shape [N, P, T]
path = "data/responses/responses.npy"
# path = "data/neural/synthetic_factors_336x300x5443.npy"
# npz_key = "traces"

batch_size = 8
val_split = 0.1
shuffle_train = true
num_workers = 0
pin_memory = true
drop_last = false

architecture = "custom"

[built_in_model]
# Used when architecture is one of: "mlp", "transformer"
latent_dim = 256
hidden_dim = 512
num_layers = 4
num_heads = 8
dropout = 0.1

[custom_model]
# Used only when architecture = "custom"
target = "v1tovideo.neural_autoencoder.models:TAE"
latent_dim = 128
input_dim = 128

[train]
epochs = 35
learning_rate = 1e-4
weight_decay = 1e-4
grad_clip_norm = 1.0
device = "cuda"

[output]
dir = "outputs/neural_autoencoder/default_run"
